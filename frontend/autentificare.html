<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Autentificare - Lumia Stradale</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --rosu-lumia: #B71C1C;
            --antracit: #121212;
            --crem-hartie: #FDFBF7;
        }

        body { 
            font-family: 'Poppins', sans-serif; 
            background-color: #f0f0f0; 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
        }

        /* Container fluid: pe mobil ocupă 95%, pe desktop se oprește la 600px */
        .app-container { 
            width: 95%; 
            max-width: 600px; 
            background-color: var(--crem-hartie); 
            padding: 40px; 
            box-sizing: border-box; 
            box-shadow: 0 0 30px rgba(0,0,0,0.1); 
            border-radius: 20px;
        }

        header { text-align: center; margin-bottom: 30px; }
        .logo-text { font-family: 'Playfair Display', serif; font-size: 32px; color: var(--rosu-lumia); }
        
        .auth-box { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .form-title { font-family: 'Playfair Display', serif; font-size: 24px; margin-bottom: 25px; text-align: center; }
        
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; font-size: 12px; font-weight: 600; margin-bottom: 5px; color: #666; }
        .input-group input { width: 100%; padding: 12px 15px; border: 1px solid #eee; border-radius: 10px; box-sizing: border-box; }
        
        .row-utils { display: flex; justify-content: space-between; align-items: center; margin: 15px 0 25px; font-size: 13px; }
        .btn-auth { width: 100%; padding: 15px; background: var(--rosu-lumia); color: white; border: none; border-radius: 12px; font-weight: 600; cursor: pointer; }
        
        .switch-form { text-align: center; margin-top: 20px; font-size: 13px; color: #666; }
        .switch-form span { color: var(--rosu-lumia); font-weight: 600; cursor: pointer; text-decoration: underline; }
        #register-fields { display: none; }
    </style>
</head>
<body>

<div class="app-container">
    <header><div class="logo-text">Lumia Stradale</div></header>

    <div class="auth-box">
        <h2 id="form-header" class="form-title">Intră în cont</h2>
        
        <form id="authForm" onsubmit="handleAuth(event)">
            <div class="input-group">
                <label>Email</label>
                <input type="email" id="email" placeholder="exemplu@gmail.com" required>
            </div>

            <div id="register-fields">
                <div class="input-group">
                    <label>Nume Complet</label>
                    <input type="text" id="nume" placeholder="Ex: Ion Popescu">
                </div>
                <div class="input-group">
                    <label>Număr Telefon</label>
                    <input type="tel" id="telefon" placeholder="07xx xxx xxx">
                </div>
            </div>

            <div class="input-group">
                <label>Parolă</label>
                <input type="password" id="parola" placeholder="••••••••" required>
            </div>

            <div class="row-utils" id="row-utils">
                <label><input type="checkbox"> Rămâi conectat</label>
                <a href="#" style="color: var(--rosu-lumia); font-size: 12px;">Ai uitat parola?</a>
            </div>

            <button type="submit" class="btn-auth" id="submit-btn">Intră în cont</button>
        </form>

        <div class="switch-form" id="switch-text">
            Nu ai cont? <span onclick="toggleForm()">Creează-ți unul aici</span>
        </div>
    </div>
</div>

<script>
    let isLogin = true;

    function toggleForm() {
        isLogin = !isLogin;
        document.getElementById('register-fields').style.display = isLogin ? 'none' : 'block';
        document.getElementById('form-header').innerText = isLogin ? 'Intră în cont' : 'Creează cont nou';
        document.getElementById('submit-btn').innerText = isLogin ? 'Intră în cont' : 'Creează Cont';
        document.getElementById('row-utils').style.display = isLogin ? 'flex' : 'none';
        document.getElementById('switch-text').innerHTML = isLogin ? 
            'Nu ai cont? <span onclick="toggleForm()">Creează-ți unul aici</span>' : 
            'Ai deja cont? <span onclick="toggleForm()">Autentifică-te</span>';
    }

    async function handleAuth(event) {
        event.preventDefault();
        const urlComplet = 'https://lumia-stradale.onrender.com/api/' + (isLogin ? 'login' : 'register');

        let dateFormular = { 
            email: document.getElementById('email').value, 
            password: document.getElementById('parola').value 
        };
        if (!isLogin) {
            dateFormular.name = document.getElementById('nume').value;
            dateFormular.phone = document.getElementById('telefon').value;
        }

        try {
            const response = await fetch(urlComplet, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(dateFormular)
            });
            const data = await response.json();
            if (response.ok) {
                if (isLogin) {
                    localStorage.setItem('user', JSON.stringify(data.user));
                    window.location.href = 'index.html';
                } else {
                    alert('Cont creat cu succes!');
                    toggleForm();
                }
            } else {
                alert(data.message || 'Date incorecte!');
            }
        } catch (error) {
            alert('Eroare de conexiune cu serverul!');
        }
    }
</script>
</body>
</html>
