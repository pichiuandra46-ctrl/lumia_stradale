<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Autentificare - Lumia Stradale</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --rosu-lumia: #B71C1C;
            --antracit: #121212;
            --crem-hartie: #FDFBF7;
        }

        body { 
            font-family: 'Poppins', sans-serif; 
            background-color: #f0f0f0; 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
        }

        /* Container: Pe mobil ocupă tot, pe desktop e o fereastră centrată */
        .app-container { 
            width: 100%; 
            max-width: 450px; 
            background-color: var(--crem-hartie); 
            min-height: 100vh; 
            padding: 40px 25px; 
            box-sizing: border-box; 
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        @media (min-width: 768px) {
            .app-container {
                max-width: 500px;
                min-height: auto;
                border-radius: 30px;
                box-shadow: 0 10px 40px rgba(0,0,0,0.15);
            }
        }

        header { text-align: center; margin-bottom: 30px; }
        .logo-text { font-family: 'Playfair Display', serif; font-size: 32px; color: var(--rosu-lumia); }
        
        .auth-box { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .form-title { font-family: 'Playfair Display', serif; font-size: 24px; margin-bottom: 25px; text-align: center; }
        
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; font-size: 12px; font-weight: 600; margin-bottom: 5px; color: #666; }
        .input-group input { width: 100%; padding: 14px; border: 1px solid #eee; border-radius: 12px; box-sizing: border-box; font-size: 15px; }
        
        .row-utils { display: flex; justify-content: space-between; align-items: center; margin: 20px 0; font-size: 13px; }
        .btn-auth { width: 100%; padding: 16px; background: var(--rosu-lumia); color: white; border: none; border-radius: 12px; font-weight: 600; cursor: pointer; font-size: 16px; transition: 0.3s; }
        .btn-auth:hover { background: #8e1515; }
        
        .switch-form { text-align: center; margin-top: 20px; font-size: 13px; color: #666; }
        .switch-form span { color: var(--rosu-lumia); font-weight: 600; cursor: pointer; text-decoration: underline; }
        
        #register-fields { display: none; }
    </style>
</head>
<body>

<div class="app-container">
    <header><div class="logo-text">Lumia Stradale</div></header>

    <div class="auth-box" id="auth-box">
        <h2 id="form-header" class="form-title">Intră în cont</h2>
        
        <form id="authForm" onsubmit="handleAuth(event)">
            <div id="fields-container">
                <div class="input-group">
                    <label>Email</label>
                    <input type="email" id="email" placeholder="exemplu@gmail.com" required>
                </div>

                <div id="register-fields">
                    <div class="input-group">
                        <label>Nume Complet</label>
                        <input type="text" id="nume" placeholder="Ex: Ion Popescu">
                    </div>
                    <div class="input-group">
                        <label>Număr Telefon</label>
                        <input type="tel" id="telefon" placeholder="07xx xxx xxx">
                    </div>
                    <div class="input-group">
                        <label>Data Nașterii</label>
                        <input type="date" id="data">
                    </div>
                </div>

                <div class="input-group" id="password-group">
                    <label>Parolă</label>
                    <input type="password" id="parola" placeholder="••••••••" required>
                </div>
            </div>

            <div class="row-utils" id="row-utils">
                <label style="display:flex; align-items:center; gap:8px;"><input type="checkbox"> Rămâi conectat</label>
                <a href="#" style="color: var(--rosu-lumia); cursor: pointer;" onclick="showResetForm(event)">Ai uitat parola?</a>
            </div>

            <button type="submit" class="btn-auth" id="submit-btn">Intră în cont</button>
        </form>

        <div class="switch-form" id="switch-text">
            Nu ai cont? <span onclick="toggleForm()">Creează-ți unul aici</span>
        </div>
    </div>
</div>

<script>
    let isLogin = true;

    // Flux recuperare parola
    function showResetForm(event) {
        event.preventDefault();
        document.getElementById('form-header').innerText = "Recuperare parolă";
        document.getElementById('fields-container').innerHTML = `
            <div class="input-group">
                <label>Introdu email-ul tău</label>
                <input type="email" id="reset-email" placeholder="exemplu@gmail.com" required>
            </div>
            <p style="font-size:12px; color:#666; text-align:center;">Vei primi un link de resetare pe adresa de email.</p>
        `;
        document.getElementById('row-utils').style.display = 'none';
        document.getElementById('switch-text').innerHTML = '<span onclick="location.reload()">Înapoi la autentificare</span>';
        document.getElementById('submit-btn').innerText = "Trimite link";
        document.getElementById('authForm').onsubmit = function(e) {
            e.preventDefault();
            alert("Un link de resetare a fost trimis la " + document.getElementById('reset-email').value);
            location.reload();
        };
    }

    // Comutare Login/Register
    function toggleForm() {
        isLogin = !isLogin;
        document.getElementById('register-fields').style.display = isLogin ? 'none' : 'block';
        document.getElementById('form-header').innerText = isLogin ? 'Intră în cont' : 'Creează cont nou';
        document.getElementById('submit-btn').innerText = isLogin ? 'Intră în cont' : 'Creează Cont';
        document.getElementById('row-utils').style.display = isLogin ? 'flex' : 'none';
        document.getElementById('switch-text').innerHTML = isLogin ? 
            'Nu ai cont? <span onclick="toggleForm()">Creează-ți unul aici</span>' : 
            'Ai deja cont? <span onclick="toggleForm()">Autentifică-te</span>';
    }

    // Logica Autentificare
    async function handleAuth(event) {
        event.preventDefault();
        const email = document.getElementById('email').value;
        const password = document.getElementById('parola').value;
        const urlComplet = 'https://lumia-stradale.onrender.com' + (isLogin ? '/api/login' : '/api/register');

        let dateFormular = { email, password };
        if (!isLogin) {
            dateFormular.name = document.getElementById('nume').value;
            dateFormular.phone = document.getElementById('telefon').value;
            dateFormular.birthdate = document.getElementById('data').value;
        }

        try {
            const response = await fetch(urlComplet, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(dateFormular)
            });
            const data = await response.json();
            if (response.ok) {
                if (isLogin) {
                    localStorage.setItem('user', JSON.stringify(data.user));
                    window.location.href = 'index.html';
                } else {
                    alert('Cont creat cu succes!');
                    toggleForm();
                }
            } else {
                alert(data.message || 'Date incorecte!');
            }
        } catch (error) { alert('Eroare de conexiune!'); }
    }
</script>
</body>
</html>
