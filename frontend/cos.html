<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coșul meu - Lumia Stradale</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --rosu-lumia: #B71C1C; --antracit: #121212; --crem-hartie: #FDFBF7; }
        body { font-family: 'Poppins', sans-serif; background: #f0f0f0; margin: 0; display: flex; justify-content: center; }
        .app-container { width: 100%; max-width: 450px; background: var(--crem-hartie); min-height: 100vh; padding: 20px; box-sizing: border-box; }
        h2 { font-family: 'Playfair Display', serif; text-align: center; color: var(--antracit); }
        .back-link { text-decoration: none; color: var(--rosu-lumia); font-size: 14px; font-weight: 600; display: inline-block; margin-bottom: 20px; }
        
        /* Stil produse */
        .cart-item { background: white; padding: 15px; border-radius: 15px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #eee; }
        .cart-item-info b { font-size: 16px; display: block; }
        .cart-item-info small { color: #888; font-size: 12px; }
        .btn-remove { background: #ffebee; color: #c62828; border: none; padding: 5px 10px; border-radius: 8px; font-size: 10px; cursor: pointer; margin-top: 5px; }

        /* Stil Checkout */
        .checkout-box { background: white; padding: 20px; border-radius: 20px; margin-top: 25px; box-shadow: 0 8px 20px rgba(0,0,0,0.06); }
        .time-option-container { background: #f9f9f9; padding: 12px; border-radius: 12px; margin: 15px 0; display: flex; align-items: center; gap: 10px; cursor: pointer; font-size: 12px; font-weight: 600; text-transform: uppercase; }
        .time-option-container input { width: 18px; height: 18px; accent-color: var(--rosu-lumia); }
        select { width: 100%; padding: 12px; margin: 8px 0 20px; border-radius: 12px; border: 1px solid #ddd; background: #fcfcfc; }
        .btn-order { background: var(--rosu-lumia); color: white; width: 100%; border: none; padding: 18px; border-radius: 15px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div class="app-container">
        <a href="meniu.html" class="back-link">← Înapoi la meniu</a>
        <h2>Coșul meu</h2>
        
        <div id="cart-items-list"></div>

        <div id="checkout-area" style="display:none;">
            <div class="checkout-box">
                <h4>Total: <span id="total-price" style="color: var(--rosu-lumia);">0</span> lei</h4>
                
                <label class="time-option-container">
                    <input type="checkbox" id="enable-time" onchange="toggleTimeSelector()">
                    <span>Vreau să aleg o oră anume</span>
                </label>

                <div id="pickup-time-wrapper" style="display:none;">
                    <label>ALEGE ORA RIDICĂRII:</label>
                    <select id="pickup-time">
                        <option>17:15</option><option>17:30</option><option>17:45</option>
                        <option>18:00</option><option>18:15</option><option>18:30</option>
                        <option>18:45</option><option>19:00</option><option>19:30</option>
                        <option>20:00</option><option>20:30</option><option>21:00</option>
                    </select>
                </div>

                <label>METODA DE PLATĂ:</label>
                <select id="payment">
                    <option>💵 Cash la rulotă</option>
                    <option>💳 Card online</option>
                </select>

                <button class="btn-order" onclick="finish()">TRIMITE COMANDA</button>
            </div>
        </div>
    </div>

    <script>
        let cart = JSON.parse(localStorage.getItem('cosLumia')) || [];

        function renderCart() {
            const list = document.getElementById('cart-items-list');
            const checkoutArea = document.getElementById('checkout-area');
            let total = 0;
            
            if (cart.length === 0) {
                list.innerHTML = "<div style='text-align:center; color:#999; margin-top:50px;'>Coșul tău este gol... 🍕</div>";
                checkoutArea.style.display = "none";
                return;
            }

            checkoutArea.style.display = "block";
            list.innerHTML = "";
            
            cart.forEach((p, index) => {
                total += p.price;
                list.innerHTML += `
                    <div class="cart-item">
                        <div class="cart-item-info">
                            <b>${p.name}</b>
                            <small>${p.obs || 'Fără mențiuni speciale'}</small>
                            <button class="btn-remove" onclick="removeItem(${index})">Șterge</button>
                        </div>
                        <div style="font-weight: 600;">${p.price} lei</div>
                    </div>`;
            });
            document.getElementById('total-price').innerText = total;
        }

        function toggleTimeSelector() {
            document.getElementById('pickup-time-wrapper').style.display = 
                document.getElementById('enable-time').checked ? "block" : "none";
        }

        function removeItem(index) {
            cart.splice(index, 1);
            localStorage.setItem('cosLumia', JSON.stringify(cart));
            renderCart();
        }

        function finish() {
            const useTime = document.getElementById('enable-time').checked;
            const time = document.getElementById('pickup-time').value;
            const method = document.getElementById('payment').value;
            
            const message = useTime ? 
                `Comandă primită! 🎉\n\nTe așteptăm la ora ${time} pentru a ridica pizza. Plata: ${method}.` : 
                `Comandă primită! 🎉\n\nPizza ta va fi gata în aproximativ 20-25 minute. Plata: ${method}.`;

            alert(message);
            localStorage.clear();
            window.location.href = 'index.html';
        }

        window.onload = renderCart;
    </script>
</body>
</html>
