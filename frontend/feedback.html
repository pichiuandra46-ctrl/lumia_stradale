<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback - Lumia Stradale</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { 
            --rosu-lumia: #B71C1C; 
            --antracit: #121212; 
            --fundal: #F9F9F9;
            --auriu: #C5A059;
        }

        body { font-family: 'Poppins', sans-serif; background-color: #f0f0f0; margin: 0; min-height: 100vh; }

        .app-container { width: 100%; min-height: 100vh; background-color: var(--fundal); display: flex; flex-direction: column; }

        .nav-red { background-color: var(--rosu-lumia); padding: 18px 5%; display: flex; align-items: center; position: relative; }
        .back-arrow { color: white; text-decoration: none; font-size: 22px; position: absolute; left: 20px; }
        .nav-title { color: white; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; margin: 0 auto; }

        .content { padding: 30px 5%; max-width: 800px; margin: 0 auto; width: 90%; }
        .section-header { text-align: center; margin-bottom: 30px; }
        .section-header h2 { font-family: 'Playfair Display', serif; margin: 0; font-size: 24px; color: var(--antracit); }
        .section-header p { font-size: 13px; color: #666; margin-top: 10px; }

        .feedback-card { background: white; padding: 25px 5%; border-radius: 25px; box-shadow: 0 10px 25px rgba(0,0,0,0.03); border: 1px solid #eee; }
        label { display: block; font-size: 10px; font-weight: 700; text-transform: uppercase; color: #999; margin-bottom: 8px; margin-left: 5px; }
        select, textarea { width: 100%; padding: 15px; border-radius: 15px; border: 1px solid #eee; background: #fdfdfd; font-family: inherit; font-size: 14px; box-sizing: border-box; margin-bottom: 25px; }

        .stars-container { display: flex; justify-content: center; gap: 10px; margin-bottom: 25px; direction: rtl; }
        .stars-container input { display: none; }
        .stars-container label { font-size: 35px; color: #ddd; cursor: pointer; transition: color 0.2s; margin: 0; }
        .stars-container label:hover, .stars-container label:hover ~ label, .stars-container input:checked ~ label { color: var(--auriu); }

        .btn-submit { background: var(--antracit); color: white; width: 100%; border: none; padding: 18px; border-radius: 15px; font-weight: 700; font-size: 15px; cursor: pointer; transition: 0.3s; }
        .btn-submit:active { transform: scale(0.97); }
        .bonus-notice { margin-top: 20px; font-size: 11px; color: #2E7D32; text-align: center; }
    </style>
</head>
<body>

<div class="app-container">
    <nav class="nav-red">
        <a href="contul_meu.html" class="back-arrow">←</a>
        <span class="nav-title">FEEDBACK</span>
    </nav>

    <div class="content">
        <div class="section-header">
            <h2>Cum a fost pizza?</h2>
            <p>Părerea ta contează enorm pentru noi.</p>
        </div>

        <div class="feedback-card">
            <form id="feedback-form">
                <label>Alege comanda vizată</label>
                <select id="order-select" required>
                    <option value="" disabled selected>Selectează o comandă...</option>
                </select>

                <label>Cât de mult ți-a plăcut?</label>
                <div class="stars-container">
                    <input type="radio" name="star" id="star5" value="5" required><label for="star5">★</label>
                    <input type="radio" name="star" id="star4" value="4"><label for="star4">★</label>
                    <input type="radio" name="star" id="star3" value="3"><label for="star3">★</label>
                    <input type="radio" name="star" id="star2" value="2"><label for="star2">★</label>
                    <input type="radio" name="star" id="star1" value="1"><label for="star1">★</label>
                </div>

                <label>Mesajul tău (opțional)</label>
                <textarea rows="4" placeholder="Spune-ne ce ți-a plăcut..."></textarea>

                <button type="submit" class="btn-submit">TRIMITE FEEDBACK</button>
                <div class="bonus-notice">✨ Primești 5 puncte loialitate pentru feedback!</div>
            </form>
        </div>
    </div>
</div>

<script>
    window.onload = () => {
        const user = JSON.parse(localStorage.getItem('user'));
        const select = document.getElementById('order-select');

        // Populăm lista de comenzi doar pentru utilizatorul logat
        if (user && user.orders && user.orders.length > 0) {
            user.orders.forEach(comanda => {
                let opt = document.createElement('option');
                opt.value = comanda.id;
                opt.innerHTML = `Comanda #${comanda.id} (${comanda.data})`;
                select.appendChild(opt);
            });
        } else {
            select.innerHTML = '<option disabled>Nu ai comenzi anterioare</option>';
        }
    };

    document.getElementById('feedback-form').onsubmit = (e) => {
        e.preventDefault();
        
        // Adăugăm punctele bonus folosind "points" (ca în Cardul de Loialitate)
        let user = JSON.parse(localStorage.getItem('user'));
        user.points = (parseInt(user.points) || 0) + 5;
        localStorage.setItem('user', JSON.stringify(user));

        alert('Mulțumim pentru feedback! Am adăugat 5 puncte bonus în contul tău.');
        window.location.href = 'contul_meu.html';
    };
</script>

</body>
</html>
