<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contul Meu - Lumia Stradale</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { 
            --rosu-lumia: #B71C1C; 
            --antracit: #121212; 
            --fundal: #F9F9F9;
            --ai-gradient: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
        }

        body { 
            font-family: 'Poppins', sans-serif; 
            background-color: var(--fundal); 
            margin: 0; 
            padding: 0;
            width: 100%;
        }

        /* Containerul ocupă 100% din lățime */
        .app-container {
            width: 100%;
            min-height: 100vh;
            background-color: var(--fundal);
        }

        .profile-header {
            background-color: var(--rosu-lumia);
            padding: 20px 5%;
            display: flex;
            align-items: center;
            gap: 15px;
            color: white;
            border-radius: 0 0 20px 20px;
        }

        .nav-back { color: white; text-decoration: none; font-size: 22px; margin-right: 10px; }

        .profile-pic {
            width: 50px; height: 50px;
            background: rgba(255,255,255,0.2);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 20px; border: 1px solid rgba(255,255,255,0.4);
        }

        .header-info h2 { margin: 0; font-size: 18px; font-family: 'Playfair Display', serif; }
        .header-info p { margin: 0; font-size: 11px; opacity: 0.8; text-transform: uppercase; }

        .loyalty-card {
            background: var(--antracit);
            margin: 15px 5%;
            padding: 15px 20px;
            border-radius: 18px;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 8px 15px rgba(0,0,0,0.1);
        }

        .points-box span { font-size: 10px; color: #aaa; text-transform: uppercase; }
        .points-box b { display: block; font-size: 18px; color: #C5A059; }

        .menu-section { padding: 10px 5%; }

        .menu-group {
            background: white;
            border-radius: 18px;
            margin-bottom: 15px;
            border: 1px solid #eee;
            overflow: hidden;
        }

        .ai-item { background: #f0f4ff; border: 1px solid #d0e0ff !important; }
        .ai-icon {
            background: var(--ai-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: bold;
        }

        .menu-item {
            display: flex; align-items: center; padding: 16px 18px;
            text-decoration: none; color: var(--antracit);
            border-bottom: 1px solid #f9f9f9;
        }

        .menu-icon { font-size: 18px; margin-right: 12px; }
        .menu-text { flex-grow: 1; font-size: 13px; font-weight: 500; }
        .arrow { color: #ddd; font-size: 16px; }

        .badge-new {
            background: var(--ai-gradient); color: white;
            font-size: 8px; padding: 2px 6px; border-radius: 10px;
            margin-left: 8px; text-transform: uppercase; font-weight: 700;
        }

        .logout-btn {
            display: block; text-align: center; margin-top: 25px;
            color: #999; text-decoration: none; font-size: 12px;
            font-weight: 600; cursor: pointer;
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="profile-header">
        <a href="index.html" class="nav-back">←</a>
        <div class="profile-pic">👤</div>
        <div class="header-info">
            <h2 id="dyn-profile-name">Client Lumia</h2>
            <p>Membru Lumia Stradale din 2026</p>
        </div>
    </div>

    <div class="loyalty-card">
        <div class="points-box">
            <span>Puncte acumulate</span>
            <b id="dyn-profile-points">0 puncte</b>
        </div>
        <div style="font-size: 20px;">🍕</div>
    </div>

    <div class="menu-section">
        <div class="menu-group ai-item">
            <a href="ai_asistent.html" class="menu-item">
                <span class="menu-icon ai-icon">✨</span>
                <span class="menu-text" style="color: #2575fc; font-weight: 600;">Lumia Stradale AI Assistant <span class="badge-new">NEW</span></span>
                <span class="arrow" style="color: #2575fc;">›</span>
            </a>
        </div>

        <div class="menu-group">
            <a href="istoric_comenzi.html" class="menu-item">
                <span class="menu-icon">📋</span>
                <span class="menu-text">Comenzile mele</span>
                <span class="arrow">›</span>
            </a>
            <a href="card_loialitate.html" class="menu-item">
                <span class="menu-icon">💳</span>
                <span class="menu-text">Card loialitate & Beneficii</span>
                <span class="arrow">›</span>
            </a>
        </div>

        <div class="menu-group">
            <a href="feedback.html" class="menu-item">
                <span class="menu-icon">⭐</span>
                <span class="menu-text">Trimite feedback</span>
                <span class="arrow">›</span>
            </a>
            <a href="setari_cont.html" class="menu-item">
                <span class="menu-icon">⚙️</span>
                <span class="menu-text">Setările contului</span>
                <span class="arrow">›</span>
            </a>
        </div>

        <div onclick="logoutUser()" class="logout-btn">IEȘIRE DIN CONT</div>
    </div>
</div>

<script>
    window.onload = () => {
        const user = JSON.parse(localStorage.getItem('user'));
        if (user) {
            if (user.name) document.getElementById('dyn-profile-name').innerText = user.name;
            const puncte = user.points !== undefined ? user.points : 0;
            document.getElementById('dyn-profile-points').innerText = puncte + " puncte";
        }
    };

    function logoutUser() {
        localStorage.removeItem('user');
        window.location.href = 'autentificare.html';
    }
</script>
</body>
</html>
